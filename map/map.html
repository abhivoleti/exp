// time out loading screen
function fadeOut(div, duration = 100) {
  let opacity = 1;
  const interval = 50;
  const decrement = interval / duration;

  const fade = setInterval(() => {
    opacity -= decrement;
    div.style.opacity = opacity;
    if (opacity <= 0) {
      clearInterval(fade);
      div.style.display = "none";
    }
  }, interval);
}
