<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Jersey+10&display=swap" rel="stylesheet">
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

Object.assign(document.documentElement.style, { scrollBehavior: 'smooth' });
Object.assign(document.body.style, {
  margin: '0', padding: '0', background: '#ffffff',
  fontFamily: "IBM Plex Mono",
  overflowX: 'hidden', cursor: 'none'
});

// hide cursor globally, then selectively restore it on interactive elements
const cursorStyle = document.createElement('style');
cursorStyle.textContent = `
  * { cursor: none !important; }
  .use-default-cursor, .use-default-cursor * { cursor: auto !important; }
`;
document.head.appendChild(cursorStyle);

// ── CAN OVERLAY ──
const canEl = document.createElement('canvas');
Object.assign(canEl.style, {
  position: 'fixed', top: '0', left: '0',
  width: '120px', height: '220px',
  pointerEvents: 'none', zIndex: '9999', willChange: 'transform'
});
document.body.appendChild(canEl);

// ── HEADER (logo left, nav right) ──
const header = document.createElement('header');
Object.assign(header.style, {
  width: '100%',
  display: 'flex',
  alignItems: 'center',
  justifyContent: 'space-between',
  padding: '2rem 3rem',
  boxSizing: 'border-box'

});

// Logo left
const logoLink = document.createElement('a');
logoLink.href = 'index.html';
logoLink.className = 'use-default-cursor';
Object.assign(logoLink.style, {
  display: 'block',
  width: '120px',
  height: '125px',
  textDecoration: 'none',
  flexShrink: '0',
  marginBottom:'1.8em',
  background: "url('assets/images/logop.png') no-repeat center/contain"
});
header.appendChild(logoLink);

// Nav right
const nav = document.createElement('nav');
Object.assign(nav.style, {
  display: 'flex',
  gap: '4.5rem',
  alignItems: 'center'
});

const navLinks = [
  { label: 'Map',     href: 'map.html'     },
  { label: 'Gallery', href: 'gallery.html' },
  { label: 'About',   href: 'about.html'   }
];

const interactiveEls = [logoLink];

navLinks.forEach(({ label, href }) => {
  const a = document.createElement('a');
  a.href = href;
  a.textContent = label;
  a.className = 'use-default-cursor';
  Object.assign(a.style, {
    fontFamily: 'IBM Plex Mono',
    fontSize: '1.95rem',
    letterSpacing: '0.3em',
    textTransform: 'uppercase',
    color: '#3333cc',
    textDecoration: 'none',
    opacity: '0.7',
    marginBottom:'1.8em',
    textShadow: '0 .21px .2px rgba(0,0,0,0.55), 0 4px 16px rgba(0,0,0,0.13)',
    transition: 'opacity 0.2s'
  });
  a.addEventListener('mouseover', () => a.style.opacity = '1');
  a.addEventListener('mouseout',  () => a.style.opacity = '0.83');
  nav.appendChild(a);
  interactiveEls.push(a);
});

header.appendChild(nav);

// dynamic cursor swap
const dynamicCursor = document.createElement('style');
document.head.appendChild(dynamicCursor);

interactiveEls.forEach(el => {
  el.addEventListener('mouseenter', () => {
    dynamicCursor.textContent = '* { cursor: auto !important; }';
    canEl.style.opacity = '0';
  });
  el.addEventListener('mouseleave', () => {
    dynamicCursor.textContent = '';
    canEl.style.opacity = '1';
  });
});

// ── LANDING SECTION ──
const landing = document.createElement('section');
Object.assign(landing.style, {
  width: '100vw', minHeight: '100vh', background: '#ffffff',
  display: 'flex', flexDirection: 'column',
  padding: '0 3rem 3rem', boxSizing: 'border-box'
});
landing.appendChild(header);
document.body.appendChild(landing);

// Content row
const contentRow = document.createElement('div');
Object.assign(contentRow.style, {
  display: 'flex', gap: '3rem', alignItems: 'flex-start', flex: '1'
});
landing.appendChild(contentRow);

// Photo
const photo = document.createElement('div');
Object.assign(photo.style, {
  flex: '0 0 48%', aspectRatio: '4/3',
  background: "url('assets/images/abt1.jpg') no-repeat center/cover",
  boxShadow: '0 2px 5px rgba(0,0,0,0.55), 0 4px 16px rgba(0,0,0,0.3)'
});
contentRow.appendChild(photo);

// Text column
const textCol = document.createElement('div');
Object.assign(textCol.style, { flex: '1', paddingTop: '0.2rem' });
contentRow.appendChild(textCol);

const paragraphs = [
  `Life is about community, learning, and adventure,`,

  `but so many spaces are restricted by commercialization under capitalism. Forced to spend if we want to explore, we are recluded into our boxes – bound by the walls of our rooms and our phone screens. Innately we yearn for nature as our ancestors had for millions of years before us, but we are the first generation to subsist for entire seasons in concrete jungles, never seeing natural forms, separated from the earth. Our mission is to bring back free adventure.`,

  `<strong>Third spaces are dying!!!</strong> The youth are left with a post-covid era, no shopping malls or common spaces to congregate. <strong>Space3</strong> is designed to offer an alternative to bring back third spaces, satiate our urge for adventure in this <strong>dystopian concrete hellscape</strong>.`,

  `These spaces are more than forgotten infrastructure <strong>they are accidental galleries.</strong> Walk through an abandoned factory and you are walking through layers of time. The architecture alone tells a story; the era it belonged to, the moment it was left behind. Peeling paint, collapsed ceilings, light breaking through shattered windows <strong>decay</strong> has a visual language of its own, and it is <strong>devastatingly beautiful.</strong>`,

  `Abandoned spaces are a symptom of late-stage capitalism, poor management of resources all in the name of quick profit. Neglected for years, even decades, decommissioned structures are everywhere. <strong>Space3 puts capitalist wastelands on a map - a gateway to a gatekept community.</strong>`
];

paragraphs.forEach(text => {
  const p = document.createElement('p');
  p.innerHTML = text;
  Object.assign(p.style, {
    fontSize: '0.93rem',
    lineHeight: '1.75',
    color: '#3333cc',
    letterSpacing: '0.01em',
    margin: '0 0 1rem 0'
  });
  textCol.appendChild(p);
});

// ── CANVAS SECTION ──
const canvasSection = document.createElement('section');
Object.assign(canvasSection.style, {
  width: '100vw', minHeight: '100vh', background: '#ffffff',
  display: 'flex', alignItems: 'center', justifyContent: 'center',
  padding: '4rem 3rem', boxSizing: 'border-box'
});
document.body.appendChild(canvasSection);

const canvasFrame = document.createElement('div');
Object.assign(canvasFrame.style, {
  width: 'min(880px, 90vw)', height: 'min(560px, 75vh)',
  background: '#fff', position: 'relative', borderRadius: '1px',
  boxShadow: '0 20px 60px rgba(0,0,0,0.55), 0 4px 16px rgba(0,0,0,0.3)'
});
canvasSection.appendChild(canvasFrame);

const sprayCanvas = document.createElement('canvas');
Object.assign(sprayCanvas.style, { display: 'block', width: '100%', height: '100%' });
canvasFrame.appendChild(sprayCanvas);

const hint = document.createElement('div');
Object.assign(hint.style, {
  position: 'absolute', bottom: '-2rem', left: '50%',
  transform: 'translateX(-50%)',
  fontFamily: 'IBM Plex Mono',
  fontSize: '0.6rem', letterSpacing: '0.2em',
  color: '#555', textTransform: 'uppercase', whiteSpace: 'nowrap'
});
hint.textContent = 'ESC — clear canvas';
canvasFrame.appendChild(hint);

// ── THREE.JS CAN ──
const renderer = new THREE.WebGLRenderer({ canvas: canEl, alpha: true, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(120, 220);
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 120 / 220, 0.1, 100);
camera.position.set(0, 0, 5.5);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 1.4);
key.position.set(2, 4, 3);
scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 0.3);
fill.position.set(-3, -1, 2);
scene.add(fill);

let canGroup = null;
let mouseDown = false;
let targetTilt = -0.35, currentTilt = -0.35;

new GLTFLoader().load(
  'assets/spraycan2.glb',
  (gltf) => {
    canGroup = gltf.scene;
    const box  = new THREE.Box3().setFromObject(canGroup);
    const size = new THREE.Vector3();
    box.getSize(size);
    canGroup.scale.setScalar(2.2 / Math.max(size.x, size.y, size.z));
    box.setFromObject(canGroup);
    const center = new THREE.Vector3();
    box.getCenter(center);
    canGroup.position.sub(center);
    canGroup.position.y -= 0.3;
    canGroup.rotation.z = -0.35;
    scene.add(canGroup);
  },
  null,
  (err) => console.error('GLB load error:', err)
);

document.addEventListener('mousedown', () => mouseDown = true);
document.addEventListener('mouseup',   () => mouseDown = false);

// hide/show can overlay when over interactive elements
let canHidden = false;
document.addEventListener('mouseover', e => {
  if (e.target.closest('.use-default-cursor')) {
    canEl.style.opacity = '0';
    canHidden = true;
  } else {
    canEl.style.opacity = '1';
    canHidden = false;
  }
});

document.addEventListener('mousemove', e => {
  canEl.style.transform = `translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 82%))`;
});

// ── SPRAY PAINT ──
const ctx = sprayCanvas.getContext('2d');

function resizeCanvas() {
  sprayCanvas.width  = canvasFrame.clientWidth;
  sprayCanvas.height = canvasFrame.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const SPRAY_COLOR = '#322dfd';
const SPRAY_SIZE  = 20;

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function sprayPaint(x, y) {
  // Dense core — many tiny particles tightly clustered
  for (let i = 0; i < 180; i++) {
    const angle  = Math.random() * Math.PI * 2;
    const radius = SPRAY_SIZE * Math.pow(Math.random(), 1.8); // heavy center bias
    const alpha  = (1 - radius / SPRAY_SIZE) * 0.45 + Math.random() * 0.15;
    const dotSize = Math.random() * 1.2 + 0.2;
    ctx.beginPath();
    ctx.arc(
      x + radius * Math.cos(angle),
      y + radius * Math.sin(angle),
      dotSize, 0, Math.PI * 2
    );
    ctx.fillStyle = hexToRgba(SPRAY_COLOR, alpha);
    ctx.fill();
  }

  // Soft wet-paint core bleed
  const grad = ctx.createRadialGradient(x, y, 0, x, y, SPRAY_SIZE * 0.55);
  grad.addColorStop(0, hexToRgba(SPRAY_COLOR, 0.38));
  grad.addColorStop(0.4, hexToRgba(SPRAY_COLOR, 0.18));
  grad.addColorStop(1, hexToRgba(SPRAY_COLOR, 0));
  ctx.beginPath();
  ctx.arc(x, y, SPRAY_SIZE * 0.55, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Sparse outer mist — realistic overspray
  for (let i = 0; i < 30; i++) {
    const angle  = Math.random() * Math.PI * 2;
    const radius = SPRAY_SIZE * (0.7 + Math.random() * 0.5);
    const alpha  = Math.random() * 0.08;
    ctx.beginPath();
    ctx.arc(
      x + radius * Math.cos(angle),
      y + radius * Math.sin(angle),
      Math.random() * 0.8 + 0.1, 0, Math.PI * 2
    );
    ctx.fillStyle = hexToRgba(SPRAY_COLOR, alpha);
    ctx.fill();
  }
}
function toCanvasPos(clientX, clientY) {
  const rect = sprayCanvas.getBoundingClientRect();
  // Offset upward to match the nozzle tip at the top of the can overlay
  const nozzleOffsetY = -(220 * 0.72); // ~158px upward
  return {
    x: clientX - rect.left,
    y: (clientY + nozzleOffsetY) - rect.top
  };
}

let spraying = false;
let lastPos  = null;

document.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  spraying = true;
  lastPos  = toCanvasPos(e.clientX, e.clientY);
});

document.addEventListener('mousemove', e => {
  lastPos = toCanvasPos(e.clientX, e.clientY);
  if (spraying) sprayPaint(lastPos.x, lastPos.y);
});

document.addEventListener('mouseup', () => spraying = false);

setInterval(() => {
  if (spraying && lastPos) sprayPaint(lastPos.x, lastPos.y);
}, 16);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    e.preventDefault();
    ctx.clearRect(0, 0, sprayCanvas.width, sprayCanvas.height);
  }
});

function animate() {
  requestAnimationFrame(animate);
  if (canGroup) {
    targetTilt   = mouseDown ? -0.55 : -0.35;
    currentTilt += (targetTilt - currentTilt) * 0.19;
    canGroup.rotation.z = currentTilt;
    canGroup.rotation.y = Math.sin(Date.now() * 0.0008) * 0.08;
  }
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
